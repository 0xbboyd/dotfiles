# Yendo Cowboy вҖ” Yazi theme (26.x schema)
# Dusty sunset cowboy aesthetic from yendo-agent TUI skin.
#
# Palette:
#   #1a0f0a  deep mahogany   вҖ” darkest background
#   #2d1810  dark saddle     вҖ” secondary background / hover bg
#   #3d1e0f  mid leather     вҖ” tertiary bg
#   #8b4513  saddle brown    вҖ” muted/dim text
#   #a0522d  sienna          вҖ” borders, separators, inactive
#   #c4522a  rust red        вҖ” primary accent, input borders
#   #e87530  sunset orange   вҖ” cwd, directories, headings
#   #f5a623  golden amber    вҖ” highlights, NORMAL mode badge
#   #fff5e1  warm cream      вҖ” primary foreground text
#   #4caf50  prairie green   вҖ” executables, SELECT mode
#   #ef5350  fire red        вҖ” errors, cut

[flavor]
dark = "yendo-cowboy"

[mgr]
cwd = { fg = "#e87530", bold = true }

hovered         = { fg = "#fff5e1", bg = "#2d1810", bold = true }
preview_hovered = { bg = "#2d1810" }

find_keyword  = { fg = "#1a0f0a", bg = "#f5a623", bold = true, italic = true }
find_position = { fg = "#c4522a", bg = "#2d1810", bold = true }

marker_copied   = { fg = "#4caf50", bg = "#4caf50" }
marker_cut      = { fg = "#ef5350", bg = "#ef5350" }
marker_marked   = { fg = "#f5a623", bg = "#f5a623" }
marker_selected = { fg = "#f5a623", bg = "#f5a623" }

count_copied   = { fg = "#1a0f0a", bg = "#4caf50" }
count_cut      = { fg = "#1a0f0a", bg = "#ef5350" }
count_selected = { fg = "#1a0f0a", bg = "#f5a623" }

border_symbol = "в”Ӯ"
border_style  = { fg = "#a0522d" }

[tabs]
active   = { fg = "#1a0f0a", bg = "#c4522a", bold = true }
inactive = { fg = "#a0522d", bg = "#2d1810" }

[mode]
normal_main = { fg = "#1a0f0a", bg = "#f5a623", bold = true }
normal_alt  = { fg = "#f5a623", bg = "#2d1810" }

select_main = { fg = "#1a0f0a", bg = "#4caf50", bold = true }
select_alt  = { fg = "#4caf50", bg = "#2d1810" }

unset_main  = { fg = "#fff5e1", bg = "#8b4513", bold = true }
unset_alt   = { fg = "#8b4513", bg = "#2d1810" }

[status]
overall   = { fg = "#fff5e1", bg = "#1a0f0a" }
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

progress_label  = { fg = "#fff5e1", bold = true }
progress_normal = { fg = "#e87530", bg = "#2d1810" }
progress_error  = { fg = "#ef5350", bg = "#2d1810" }

perm_type  = { fg = "#8b4513" }
perm_read  = { fg = "#f5a623" }
perm_write = { fg = "#ef5350" }
perm_exec  = { fg = "#4caf50" }
perm_sep   = { fg = "#3d1e0f" }

[input]
border   = { fg = "#c4522a" }
title    = { fg = "#e87530", bold = true }
value    = { fg = "#fff5e1" }
selected = { bg = "#2d1810" }

[cmp]
border   = { fg = "#c4522a" }
active   = { fg = "#fff5e1", bg = "#3d1e0f" }
inactive = { fg = "#a0522d" }

icon_file    = ""
icon_folder  = ""
icon_command = ""

[pick]
border   = { fg = "#c4522a" }
active   = { fg = "#f5a623", bg = "#2d1810" }
inactive = { fg = "#a0522d" }

[confirm]
border     = { fg = "#c4522a" }
title      = { fg = "#e87530" }
content    = {}
list       = {}
btn_yes    = { bg = "#3d1e0f" }
btn_no     = {}
btn_labels = [ "  [Y]es  ", "  (N)o  " ]

[tasks]
border  = { fg = "#c4522a" }
title   = { fg = "#e87530", bold = true }
hovered = { fg = "#fff5e1", bg = "#2d1810" }

[spot]
border = { fg = "#c4522a" }
title  = { fg = "#e87530" }

[which]
cols            = 3
mask            = { bg = "#1a0f0a" }
cand            = { fg = "#f5a623" }
rest            = { fg = "#e87530" }
desc            = { fg = "#fff5e1" }
separator       = "  "
separator_style = { fg = "#c4522a" }

[notify]
title_info  = { fg = "#f5a623", bold = true }
title_warn  = { fg = "#e87530", bold = true }
title_error = { fg = "#ef5350", bold = true }

icon_info  = ""
icon_warn  = ""
icon_error = ""

[help]
on      = { fg = "#f5a623" }
run     = { fg = "#e87530" }
desc    = { fg = "#fff5e1" }
hovered = { bg = "#2d1810" }
footer  = { fg = "#fff5e1", bg = "#a0522d" }

[filetype]
rules = [
  # Images вҖ” amber
  { mime = "image/*",                          fg = "#f5a623" },

  # Video / audio вҖ” sienna / green
  { mime = "{audio,video}/*",                  fg = "#a0522d" },

  # Archives вҖ” rust red
  { mime = "application/*zip",                 fg = "#c4522a" },
  { mime = "application/x-{tar,bzip*,7z-compressed,xz,rar,zstd}", fg = "#c4522a" },

  # Documents вҖ” cream
  { mime = "application/{pdf,doc,rtf,vnd.*}",  fg = "#fff5e1" },

  # Orphan symlinks вҖ” fire red bg
  { name = "*", is = "orphan", bg = "#ef5350" },

  # Executables вҖ” prairie green
  { name = "*", is = "exec", fg = "#4caf50", bold = true },

  # Directories вҖ” sunset orange
  { name = "*/", fg = "#e87530", bold = true },

  # Fallback
  { name = "*", fg = "#fff5e1" },
]

[icon]
# prepend_conds: fire before builtin conds but AFTER builtin dirs/files/exts.
# They catch files that DON'T have a specific builtin rule вҖ” execs, orphans,
# links, hidden files, and generic dirs/files.
prepend_conds = [
  # Directories вҖ” sunset orange folder (catches dirs without builtin name rule)
  { if = "dir",    text = "пҒј", fg = "#e87530" },
  # Executables вҖ” prairie green terminal icon
  { if = "exec",   text = "п’ү", fg = "#4caf50" },
  # Orphan (broken) symlinks вҖ” fire red
  { if = "orphan", text = "п’Ғ", fg = "#ef5350" },
  # Healthy symlinks вҖ” amber
  { if = "link",   text = "п’Ғ", fg = "#f5a623" },
  # Hidden files вҖ” dimmed saddle brown generic file
  { if = "hidden", text = "п…ӣ", fg = "#8b4513" },
]


# improve colors
set -g default-terminal 'screen-256color'

set -s extended-keys on

# act like vim
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+

# act like GNU screen
unbind C-b
set -g prefix C-z

# start window numbers at 1 to match keyboard order with tmux window order
set -g base-index 1
set -g pane-base-index 1

# move system clipboard into tmux paste buffer
bind C-p run-shell -b "tmux set-buffer \"$(wl-paste -n)\"; tmux paste-buffer"
# move tmux copy buffer into system clipboard
bind C-y run-shell -b "tmux save-buffer - | wl-copy"

# status bar on top
set -g status-position bottom

# ── Yendo Cowboy color scheme ──
# Palette:  #1a0f0a deep mahogany (bg)  /  #fff5e1 warm cream (fg)
#            #e87530 sunset orange (active/highlight)  /  #f5a623 golden amber (messages)
#            #c4522a rust red (borders)  /  #a0522d sienna (inactive)
#            #8b4513 saddle brown (dim)  /  #4caf50 prairie green (ok)
#            #ef5350 fire red (alerts)

set -g status-left-length 52
set -g status-right-length 451
set -g status-fg '#fff5e1'
set -g status-bg '#1a0f0a'
set -g pane-border-style fg='#a0522d'
set -g pane-active-border-style fg='#e87530'
set -g message-style fg='#1a0f0a'
set -g message-style bg='#f5a623'
set -g message-style bold

# Status left: session name in rust-on-cream
set -g status-left '#[fg=#1a0f0a,bg=#e87530,bold]  #S  #[fg=#e87530,bg=#1a0f0a]  '

# Status right: date/time in cream
set -g status-right '#[fg=#a0522d,bg=default]#[fg=#1a0f0a,bg=#a0522d] %d %b • %R '

# Inactive windows: sienna on dark saddle
set -g window-status-format '#[fg=#a0522d,bg=#2d1810] #I • #W '

# Active window: dark bg on sunset orange (inverted)
set -g window-status-current-format '#[fg=#1a0f0a,bg=#e87530,bold] #I • #W '

# Window separators
set -g window-status-separator ''

# No escape time for vi mode
set -sg escape-time 0

# Bigger history
set -g history-limit 10000

# allow terminal to handle paste events and image passthrough directly
set -g allow-passthrough on

# switch to last pane
bind-key C-a last-pane

# Status Bar ---------------------
# (colors set above in Yendo Cowboy scheme)
set -g status on

